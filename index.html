<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafiz | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            padding: 5px;
            background: #0f172a;
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 18px;
            height: 18px;
            background: #22c55e;
            border: 3px solid #1e293b;
            border-radius: 50%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .skill-tag {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-fb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1877f2;
            color: #fff;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(24, 119, 242, 0.4);
        }

        .btn-fb:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(24, 119, 242, 0.5);
            background: #166fe5;
        }

        .footer-text {
            margin-top: 35px;
            color: #475569;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="profile-wrapper">
    <img src="1769962925224.jpg" alt="Hafiz" class="profile-img">
    <div class="status-dot"></div>
            </div>
            

            <h1>MD Hafiz</h1>
            <p class="tagline">Tech Enthusiast</p>
            
            <p class="description">
          system 
            </p>

            <div class="skills">
                <span class="skill-tag">Python</span>
                <span class="skill-tag">Cybersecurity</span>
                <span class="skill-tag">Web Dev</span>
                <span class="skill-tag">Termux</span>
            </div>

            <a href="https://www.facebook.com/mdhafiz20" target="_blank" class="btn-fb">
                <i class="fab fa-facebook-f"></i> ফেসবুকে যুক্ত হোন
            </a>

        <div style="margin-top: 15px;">
    <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px;">
        <i class="fas fa-music"></i> ব্যাকগ্রাউন্ড মিউজিক
    </p>
    <audio controls style="height: 35px; width: 100%; max-width: 240px; filter: invert(0.9) hue-rotate(180deg);">
    <source src="https://raw.githubusercontent.com/mdhafiz22/my-website/main/bg-music.mp3" type="audio/mpeg">
        আপনার ব্রাউজার অডিও সাপোর্ট করে না।
    </audio>
        </div>
            
            
            
            <p class="footer-text">&copy; 2026 mdhafiz.ami.bd</p>
        </div>
    </div>

</body>
</html>
